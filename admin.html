<!DOCTYPE html>

<meta charset="UTF-8">

<title>RX TOP UP BD</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#111827;
    color:white;
}

header{
    background:#ff6a00;
    padding:20px;
    text-align:center;
    font-size:28px;
    font-weight:bold;
}

.container{
    max-width:1100px;
    margin:auto;
    padding:20px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
}

.card{
    background:#1f2937;
    border-radius:15px;
    padding:20px;
    text-align:center;
    transition:.3s;
}

.card:hover{
    transform:scale(1.05);
}

.card h2{
    color:#FFD700;
    margin-bottom:10px;
}

.price{
    font-size:28px;
    color:#00ff99;
    margin:15px 0;
}

button{
    background:#ff6a00;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#ff4500;
}

footer{
    text-align:center;
    padding:20px;
    margin-top:40px;
    background:#000;
}
</style>

</head>
